<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>claudeCAD STEP viewer</title>
<style>
  html, body { margin: 0; height: 100%; background: #1e1e22; overflow: hidden; }
  #viewer { width: 100vw; height: 100vh; }
  #status {
    position: fixed; top: 10px; left: 12px; z-index: 10;
    font: 13px/1.4 -apple-system, system-ui, sans-serif; color: #ddd;
    background: rgba(0,0,0,.55); padding: 6px 10px; border-radius: 6px;
    pointer-events: none; max-width: 60vw;
  }
  #status.error { color: #ff9a9a; }
  #hint {
    position: fixed; bottom: 10px; left: 12px; z-index: 10;
    font: 11px/1.4 -apple-system, system-ui, sans-serif; color: #888;
    pointer-events: none;
  }
</style>
<script src="vendor/o3dv.min.js"></script>
</head>
<body>
<div id="viewer"></div>
<div id="status">loading…</div>
<div id="hint">?model=/out/step/&lt;name&gt;.step &nbsp;·&nbsp; or drop a .step/.glb file anywhere</div>
<script>
const status = document.getElementById('status');
const model = new URLSearchParams(location.search).get('model')
    || '/out/step/cuban_bracelet.step';

const viewer = new OV.EmbeddedViewer(document.getElementById('viewer'), {
    backgroundColor: new OV.RGBAColor(30, 30, 34, 255),
    defaultColor: new OV.RGBColor(212, 175, 55),   // STEP carries no colors; show gold
    edgeSettings: new OV.EdgeSettings(true, new OV.RGBColor(60, 45, 10), 30),
    onModelLoaded: () => {
        status.textContent = decodeURIComponent(model.split('/').pop());
    },
    onModelLoadFailed: () => {
        status.classList.add('error');
        status.textContent = 'failed to load ' + model + ' — check the path and the server console';
    },
});

status.textContent = 'loading ' + model.split('/').pop() + '…';
viewer.LoadModelFromUrlList([model]);

window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('drop', (e) => {
    e.preventDefault();
    if (e.dataTransfer.files.length > 0) {
        status.classList.remove('error');
        status.textContent = 'loading ' + e.dataTransfer.files[0].name + '…';
        viewer.LoadModelFromFileList(e.dataTransfer.files);
    }
});
</script>
</body>
</html>
